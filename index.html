<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<p>

Dear Tat,

<br><br>

Another year older.

Still funny.

Still annoying.

Still one of my favourite people.

May your smile never fade.

May your dreams come true.
